{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px;">
    <h2>Homologar Nova Loja no Barramento</h2>
    <form method="POST">
        <div class="form-group">
            <label>Nome Fantasia da Farmácia</label>
            <input type="text" name="nome" required placeholder="Ex: Drogaria Nazaré Filial 1">
        </div>
        <div class="form-group">
            <label>CNPJ</label>
            <input type="text" name="cnpj" required placeholder="Ex: 00.000.000/0001-00">
        </div>
        <div class="form-group">
            <label>Sistema de PDV Local</label>
            <select name="pdv_sistema">
                <option value="Linx Farma">Linx Farma</option>
                <option value="Trier Sistemas">Trier Sistemas</option>
                <option value="InovaFarma">InovaFarma</option>
                <option value="Outro/Customizado">Outro/Customizado</option>
            </select>
        </div>
        <div class="form-group">
            <label>Status de Ativação Inicial</label>
            <select name="status_onboarding">
                <option value="Em Integração">Em Integração (Carregando Top 200 SKUs)</option>
                <option value="Ativo">Ativo (Treinamento Realizado e Validado)</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Salvar e Sincronizar</button>
        <a href="{{ url_for('listar_lojas') }}" class="btn btn-danger">Cancelar</a>
    </form>
</div>
{% endblock %}
