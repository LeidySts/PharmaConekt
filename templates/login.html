{% extends 'base.html' %}

{% block content %}
<div class="login-container">
    <h2 style="text-align: center; color: var(--primary-color);">Conectar Plataforma</h2>
    <p style="text-align: center; color: var(--secondary-color); font-size: 0.9rem;">União instantânea de dados de PDV e Distribuidores</p>
    <form method="POST">
        <div class="form-group">
            <label for="username">Usuário Administrador</label>
            <input type="text" id="username" name="username" required placeholder="Ex: admin">
        </div>
        <div class="form-group">
            <label for="password">Senha de Acesso</label>
            <input type="password" id="password" name="password" required placeholder="Ex: admin123">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Entrar no Sistema</button>
    </form>
    <p style="font-size: 0.8rem; text-align: center; margin-top: 15px; color: gray;">Admin padrão: <b>admin</b> / Senha: <b>admin123</b></p>
</div>
{% endblock %}
